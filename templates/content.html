<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 콘텐츠 생성 - Content Automation Studio</title>

    <!-- Toast UI Editor CSS (Local) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/toastui-editor.min.css') }}" />
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor-viewer.min.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>

    <!-- Toast UI Editor JS (Local) - Head에 미리 로드 -->
    <script src="{{ url_for('static', filename='lib/toastui-editor-all.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toast-editor.js') }}"></script>

    <!-- Simple Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 콘텐츠 생성</h1>
            <p>AI 기반 콘텐츠 자동 생성 시스템</p>
        </header>

        <main>
            <!-- 콘텐츠 생성 폼 -->
            <div class="form-section">
                <div class="form-group">
                    <label for="topic">주제</label>
                    <input type="text" id="topic" class="form-control" placeholder="생성할 콘텐츠의 주제를 입력하세요">
                </div>

                <div class="form-group">
                    <label for="keywords">키워드</label>
                    <input type="text" id="keywords" class="form-control" placeholder="주요 키워드를 쉼표로 구분하여 입력하세요">
                </div>

                <div class="form-group">
                    <label for="content-type">콘텐츠 타입</label>
                    <select id="content-type" class="form-control">
                        <option value="blog">블로그 포스트</option>
                        <option value="social">소셜 미디어</option>
                        <option value="email">이메일</option>
                    </select>
                </div>

                <button id="generate-btn" class="btn btn-primary">
                    <i class="fas fa-magic"></i> 콘텐츠 생성
                </button>
            </div>

            <!-- 생성 결과 -->
            <div id="results" style="display: none;">
                <div class="results-header">
                    <h2>생성된 콘텐츠</h2>
                </div>
                <div id="results-content">
                    <!-- 결과가 여기에 표시됩니다 -->
                </div>
            </div>

            <!-- 에디터 모달 -->
            <div id="editor-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="modal-title-section">
                            <h3 id="modal-title">AI 콘텐츠 에디터</h3>
                            <div class="modal-actions">
                                <button class="btn btn-secondary" onclick="editor.exportMarkdown()">
                                    <i class="fas fa-file-export"></i> Markdown
                                </button>
                                <button class="btn btn-secondary" onclick="editor.exportHTML()">
                                    <i class="fas fa-file-code"></i> HTML
                                </button>
                                <button class="btn btn-info" onclick="editor.loadDraft()">
                                    <i class="fas fa-file-import"></i> 불러오기
                                </button>
                                <button class="btn btn-danger" onclick="closeEditorModal()">
                                    <i class="fas fa-times"></i> 닫기
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div id="editor-container"></div>

                        <!-- 생성된 이미지 목록 -->
                        <div id="generated-images" style="display: none;">
                            <h4><i class="fas fa-images"></i> 생성된 이미지 목록</h4>
                            <div id="images-list" class="images-grid">
                                <!-- 이미지들이 여기에 표시됩니다 -->
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <div class="footer-left">
                            <button class="btn btn-secondary" onclick="editor.clearContent()">
                                <i class="fas fa-trash"></i> 내용 지우기
                            </button>
                            <button class="btn btn-info" onclick="editor.saveDraft()">
                                <i class="fas fa-save"></i> 임시 저장
                            </button>
                        </div>
                        <div class="footer-right">
                            <button class="btn btn-warning" onclick="editor.saveContent()">
                                <i class="fas fa-check"></i> 저장
                            </button>
                            <button class="btn btn-primary" onclick="showPublishOptions()">
                                <i class="fas fa-paper-plane"></i> 발행 옵션
                            </button>
                            <button class="btn btn-success" onclick="saveAndPublish()">
                                <i class="fas fa-rocket"></i> 저장 후 즉시 발행
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 발행 옵션 모달 -->
            <div id="publish-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-paper-plane"></i> 발행 옵션</h3>
                    </div>
                    <div class="modal-body">
                        <div class="publish-options">
                            <div class="form-section">
                                <h4><i class="fas fa-globe"></i> 발행 플랫폼</h4>
                                <div class="form-group">
                                    <label>
                                        <input type="checkbox" value="tistory" id="platform-tistory">
                                        <i class="fas fa-blog"></i> Tistory
                                    </label>
                                    <label>
                                        <input type="checkbox" value="blogger" id="platform-blogger">
                                        <i class="fab fa-google"></i> Google Blogger
                                    </label>
                                    <label>
                                        <input type="checkbox" value="naver" id="platform-naver">
                                        <i class="fas fa-line"></i> Naver Blog
                                    </label>
                                    <label>
                                        <input type="checkbox" value="wordpress" id="platform-wordpress">
                                        <i class="fab fa-wordpress"></i> WordPress
                                    </label>
                                </div>
                            </div>

                            <div class="form-section">
                                <h4><i class="fas fa-clock"></i> 발행 시간</h4>
                                <div class="form-group">
                                    <label>
                                        <input type="radio" name="publish-time" value="now" checked>
                                        즉시 발행
                                    </label>
                                    <label>
                                        <input type="radio" name="publish-time" value="scheduled">
                                        예약 발행
                                    </label>
                                </div>
                                <div id="schedule-options" style="display: none;">
                                    <div class="form-group">
                                        <label>예약 날짜 및 시간:</label>
                                        <input type="datetime-local" id="schedule-datetime" class="form-control">
                                    </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h4><i class="fas fa-tags"></i> SEO 설정</h4>
                                <div class="form-group">
                                    <label>태그 (쉼표로 구분):</label>
                                    <input type="text" id="publish-tags" class="form-control" placeholder="AI, 블로그, 콘텐츠 마케팅">
                                </div>
                                <div class="form-group">
                                    <label>메타 설명:</label>
                                    <textarea id="publish-meta-description" class="form-control" rows="2" placeholder="검색 결과에 표시될 설명..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <div class="footer-left">
                            <button class="btn btn-secondary" onclick="closePublishModal()">
                                <i class="fas fa-times"></i> 취소
                            </button>
                        </div>
                        <div class="footer-right">
                            <button class="btn btn-primary" onclick="publishContent()">
                                <i class="fas fa-paper-plane"></i> 발행하기
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 전역 변수 - 기존 editor 변수와 충돌 방지
        let contentEditor = null;
        let currentContent = null;
        let generatedImages = [];

        // 간단한 콘텐츠 생성 함수
        document.getElementById('generate-btn').addEventListener('click', async function() {
            const topic = document.getElementById('topic').value;
            const keywords = document.getElementById('keywords').value;
            const contentType = document.getElementById('content-type').value;

            if (!topic) {
                alert('주제를 입력해주세요.');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...';

            try {
                // 향상된 API 호출 (스토리텔링 + 이미지 자동 삽입)
                const response = await fetch('/api/content/generate-enhanced-blog', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic: topic,
                        keywords: keywords ? keywords.split(',').map(k => k.trim()) : [],
                        tone: 'professional',
                        length: 'long',
                        target_audience: 'general',
                        storytelling: true,
                        auto_images: true
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 생성된 이미지 정보 저장
                    if (data.generated_images) {
                        generatedImages = data.generated_images;
                    }

                    currentContent = {
                        title: data.title,
                        summary: data.seo_meta?.description || 'AI가 생성한 전문적인 콘텐츠입니다.',
                        content: data.content,
                        imageCount: data.image_count || 0,
                        metadata: data.enhancement_info || {},
                        images: data.generated_images || []
                    };

                    displayResults(currentContent);
                } else {
                    // API 실패 시 향상된 더미 데이터 fallback
                    console.warn('API call failed, using fallback data:', data.error || data.message);
                    const dummyResult = {
                        title: `${topic}에 대한 모든 것: 전문가의 완벽 가이드`,
                        summary: `${keywords}와 관련된 전문적인 인사이트와 실용적인 정보를 제공합니다.`,
                        content: `# ${topic}에 대한 모든 것: 전문가의 완벽 가이드\n\n## 서론: 왜 ${topic}가 중요한가요?\n안녕하세요! 오늘은 많은 분들이 궁금해하는 ${topic}에 대해 깊이 있게 이야기해보려고 합니다. 최근 ${keywords}와 관련된 질문이 정말 많아졌는데요, 이런 관심은 ${topic}가 우리의 일상과 비즈니스에서 얼마나 중요한지를 보여주는 증거 같습니다.\n\n## 본론: ${topic}의 핵심 요소들\n\n### 1. ${topic}의 기본 개념 이해하기\n${topic}를 제대로 이해하기 위해서는 먼저 그 본질을 파악해야 합니다. ${keywords}와의 관계를 살펴보면, 이 둘은 서로를 보완하는 중요한 요소들이 됩니다.\n\n[이미지: ${topic}의 개념을 시각적으로 보여주는 다이어그램]\n\n### 2. 실전 활용 방법\n실제로 ${topic}를 활용하는 방법은 여러 가지가 있습니다. 첫째, ${keywords}를 통한 접근법이 있고, 둘째는 실제 사례를 통한 학습법이 있습니다.\n\n[이미지: ${topic} 실전 활용 사례]\n\n### 3. 전문가들의 노하우\n많은 전문가들이 ${topic}에 대한 자신의 경험을 공유하고 있습니다. 이들의 노하우는 우리에게 큰 도움이 될 수 있습니다.\n\n## 결론: ${topic}를 통해 얻는 가치\n오늘 우리는 ${topic}에 대해 자세히 알아보았습니다. ${keywords}를 중심으로 한 이번 가이드가 여러분의 이해에 도움이 되었기를 바랍니다.\n\n${topic}는 단순한 지식을 넘어, 우리의 삶과 비즈니스에 실질적인 가치를 제공하는 중요한 요소입니다. 이 가이드를 바탕으로 여러분만의 ${topic} 활용법을 찾아보시기 바랍니다.\n\n감사합니다!`,
                        imageCount: 2,
                        metadata: {
                            fallback: true,
                            ai_enhanced: true,
                            word_count: 2000,
                            estimated_reading_time: 8
                        },
                        images: [
                            {
                                prompt: `${topic}의 개념을 시각적으로 보여주는 전문적인 다이어그램`,
                                url: `https://via.placeholder.com/600x400/4A90E2/FFFFFF?text=${encodeURIComponent(topic + ' 개념도')}`,
                                placeholder: `[이미지: ${topic}의 개념을 시각적으로 보여주는 다이어그램]`
                            },
                            {
                                prompt: `${topic} 실전 활용 사례를 보여주는 전문적인 이미지`,
                                url: `https://via.placeholder.com/600x400/7B68EE/FFFFFF?text=${encodeURIComponent(topic + ' 활용 사례')}`,
                                placeholder: `[이미지: ${topic} 실전 활용 사례]`
                            }
                        ]
                    };
                    generatedImages = dummyResult.images;
                    displayResults(dummyResult);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> 콘텐츠 생성';
            }
        });

        function displayResults(result) {
            const resultsContent = document.getElementById('results-content');

            // 메타데이터 정보 표시
            let metadataInfo = '';
            if (result.metadata && result.metadata.ai_enhanced) {
                metadataInfo = `
                    <div class="content-metadata" style="margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; font-size: 0.9em;">
                        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                            <span><i class="fas fa-magic"></i> AI 강화</span>
                            <span><i class="fas fa-user-edit"></i> 전문 블로거 스타일</span>
                            <span><i class="fas fa-book-open"></i> 스토리텔링 형식</span>
                            ${result.imageCount > 0 ? `<span><i class="fas fa-images"></i> 이미지 ${result.imageCount}개 생성</span>` : ''}
                            <span><i class="fas fa-file-word"></i> ${result.metadata.word_count || 0}자</span>
                            <span><i class="fas fa-clock"></i> 약 ${result.metadata.estimated_reading_time || 0}분 읽기</span>
                        </div>
                    </div>
                `;
            }

            resultsContent.innerHTML = `
                <div class="content-item">
                    <h3>${result.title}</h3>
                    <p><strong>요약:</strong> ${result.summary}</p>
                    ${metadataInfo}
                    <div class="content-preview">
                        <div style="max-height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin: 10px 0;">
                            ${formatMarkdown(result.content)}
                        </div>
                    </div>
                    <div class="content-actions">
                        <button class="btn btn-primary" onclick="openEditor('${result.title}', \`${result.content}\`)">
                            <i class="fas fa-edit"></i> 에디터에서 열기
                        </button>
                        <button class="btn btn-secondary" onclick="copyToClipboard(\`${result.content}\`)">
                            <i class="fas fa-copy"></i> 복사
                        </button>
                        <button class="btn btn-info" onclick="downloadMarkdown('${result.title}.md', \`${result.content}\`)">
                            <i class="fas fa-download"></i> 다운로드
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('results').style.display = 'block';
        }

        function formatMarkdown(content) {
            // 간단한 마크다운 렌더링
            return content
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/!\[(.*?)\]\((.*?)\)/gim, '<img src="$2" alt="$1" style="max-width: 100%; height: auto; margin: 10px 0;" />')
                .replace(/\[이미지: (.*?)\]/gim, '<div style="padding: 10px; background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 5px; margin: 10px 0;"><i class="fas fa-image"></i> 이미지: $1</div>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                .replace(/\n\n/gim, '</p><p>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        function openEditor(title, content) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('editor-modal').style.display = 'flex';
            document.body.classList.add('modal-open');

            // 에디터 초기화
            if (!contentEditor) {
                contentEditor = new RichTextEditor('editor-container', {
                    placeholder: '콘텐츠를 편집하세요...',
                    height: '400px',
                    autoSave: true
                });
            }

            contentEditor.setContent(content);

            // 생성된 이미지 목록 표시
            displayGeneratedImages();
        }

        function closeEditorModal() {
            document.getElementById('editor-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function displayGeneratedImages() {
            const imagesContainer = document.getElementById('generated-images');
            const imagesList = document.getElementById('images-list');

            if (generatedImages && generatedImages.length > 0) {
                imagesContainer.style.display = 'block';

                imagesList.innerHTML = generatedImages.map((image, index) => `
                    <div class="image-item" style="border: 1px solid #ddd; padding: 10px; margin: 5px; border-radius: 5px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="${image.url}" alt="생성된 이미지 ${index + 1}"
                                 style="width: 80px; height: 60px; object-fit: cover; border-radius: 3px;">
                            <div style="flex: 1;">
                                <div style="font-size: 0.9em; font-weight: bold;">이미지 ${index + 1}</div>
                                <div style="font-size: 0.8em; color: #666; margin-top: 3px;">${image.prompt}</div>
                            </div>
                            <button class="btn btn-secondary" onclick="regenerateImage(${index})"
                                    style="padding: 5px 10px; font-size: 0.9em;">
                                <i class="fas fa-sync"></i> 🔄 재생성
                            </button>
                        </div>
                    </div>
                `).join('');
            } else {
                imagesContainer.style.display = 'none';
            }
        }

        async function regenerateImage(index) {
            const image = generatedImages[index];
            if (!image) return;

            const imageItem = document.querySelectorAll('.image-item')[index];
            const originalContent = imageItem.innerHTML;

            // 로딩 상태 표시
            imageItem.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <i class="fas fa-spinner fa-spin"></i> 이미지 재생성 중...
                </div>
            `;

            try {
                const response = await fetch('/api/content/regenerate-image', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: image.prompt,
                        index: index
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 이미지 URL 업데이트
                    generatedImages[index].url = data.new_image_url;

                    // 에디터 내의 이미지 URL도 업데이트
                    if (contentEditor) {
                        let editorContent = contentEditor.getContent();
                        // 이전 이미지 URL을 새 URL로 교체
                        editorContent = editorContent.replace(image.url, data.new_image_url);
                        contentEditor.setContent(editorContent);
                    }

                    showToast(`이미지 ${index + 1}가 재생성되었습니다.`, 'success');
                } else {
                    throw new Error(data.error || '이미지 재생성 실패');
                }
            } catch (error) {
                console.error('Image regeneration error:', error);
                showToast('이미지 재생성에 실패했습니다.', 'error');
                // 원래 내용 복원
                imageItem.innerHTML = originalContent;
            }

            // 이미지 목록 새로고침
            displayGeneratedImages();
        }

        function showPublishOptions() {
            if (!currentContent) {
                alert('발행할 콘텐츠가 없습니다.');
                return;
            }

            // 현재 콘텐츠 정보로 발행 폼 채우기
            document.getElementById('publish-tags').value =
                currentContent.title.split(' ').slice(0, 5).join(', ');
            document.getElementById('publish-meta-description').value = currentContent.summary;

            document.getElementById('publish-modal').style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        function closePublishModal() {
            document.getElementById('publish-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        async function saveContent() {
            if (!contentEditor) return;

            try {
                const content = contentEditor.getContent();
                const response = await fetch('/api/content/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: currentContent.title,
                        content: content,
                        metadata: currentContent.metadata,
                        images: generatedImages
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('콘텐츠가 저장되었습니다.', 'success');
                } else {
                    throw new Error(data.error || '저장 실패');
                }
            } catch (error) {
                console.error('Save error:', error);
                showToast('콘텐츠 저장에 실패했습니다.', 'error');
            }
        }

        async function saveAndPublish() {
            // 먼저 저장
            await saveContent();

            // 발행 옵션 보여주기
            showPublishOptions();
        }

        async function publishContent() {
            try {
                // 선택된 플랫폼 확인
                const platforms = [];
                ['tistory', 'blogger', 'naver', 'wordpress'].forEach(platform => {
                    if (document.getElementById(`platform-${platform}`).checked) {
                        platforms.push(platform);
                    }
                });

                if (platforms.length === 0) {
                    alert('최소 하나 이상의 발행 플랫폼을 선택해주세요.');
                    return;
                }

                const publishTime = document.querySelector('input[name="publish-time"]:checked').value;
                const scheduleDateTime = publishTime === 'scheduled'
                    ? document.getElementById('schedule-datetime').value
                    : null;

                const publishData = {
                    title: currentContent.title,
                    content: contentEditor ? contentEditor.getContent() : currentContent.content,
                    platforms: platforms,
                    tags: document.getElementById('publish-tags').value,
                    meta_description: document.getElementById('publish-meta-description').value,
                    publish_immediately: publishTime === 'now',
                    schedule_datetime: scheduleDateTime,
                    images: generatedImages
                };

                const response = await fetch('/api/publisher/publish-multiple', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(publishData)
                });

                const data = await response.json();

                if (data.success) {
                    const platformNames = platforms.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(', ');
                    if (publishTime === 'now') {
                        showToast(`${platformNames}에 즉시 발행되었습니다.`, 'success');
                    } else {
                        showToast(`${platformNames}에 예약 발행되었습니다.`, 'success');
                    }
                    closePublishModal();
                } else {
                    throw new Error(data.error || '발행 실패');
                }
            } catch (error) {
                console.error('Publish error:', error);
                showToast('발행에 실패했습니다: ' + error.message, 'error');
            }
        }

        // 예약 발행 옵션 토글
        document.addEventListener('change', function(e) {
            if (e.target.name === 'publish-time') {
                const scheduleOptions = document.getElementById('schedule-options');
                if (e.target.value === 'scheduled') {
                    scheduleOptions.style.display = 'block';
                    // 최소 예약 시간을 현재 시간으로부터 1시간 후로 설정
                    const minDate = new Date();
                    minDate.setHours(minDate.getHours() + 1);
                    document.getElementById('schedule-datetime').min = minDate.toISOString().slice(0, 16);
                } else {
                    scheduleOptions.style.display = 'none';
                }
            }
        });

        function downloadMarkdown(filename, content) {
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            showToast('Markdown 파일이 다운로드되었습니다.', 'success');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('콘텐츠가 클립보드에 복사되었습니다.', 'success');
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeEditorModal();
                closePublishModal();
            }
        });
    </script>
</body>
</html>
