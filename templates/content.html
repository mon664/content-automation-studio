<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 콘텐츠 생성 - Content Automation Studio</title>

    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor-viewer.min.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>

    <!-- Toast UI Editor JS - Head에 미리 로드 -->
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="{{ url_for('static', filename='js/toast-editor.js') }}"></script>

    <!-- Simple Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 콘텐츠 생성</h1>
            <p>AI 기반 콘텐츠 자동 생성 시스템</p>
        </header>

        <main>
            <!-- 콘텐츠 생성 폼 -->
            <div class="form-section">
                <div class="form-group">
                    <label for="topic">주제</label>
                    <input type="text" id="topic" class="form-control" placeholder="생성할 콘텐츠의 주제를 입력하세요">
                </div>

                <div class="form-group">
                    <label for="keywords">키워드</label>
                    <input type="text" id="keywords" class="form-control" placeholder="주요 키워드를 쉼표로 구분하여 입력하세요">
                </div>

                <div class="form-group">
                    <label for="content-type">콘텐츠 타입</label>
                    <select id="content-type" class="form-control">
                        <option value="blog">블로그 포스트</option>
                        <option value="social">소셜 미디어</option>
                        <option value="email">이메일</option>
                    </select>
                </div>

                <button id="generate-btn" class="btn btn-primary">
                    <i class="fas fa-magic"></i> 콘텐츠 생성
                </button>
            </div>

            <!-- 생성 결과 -->
            <div id="results" style="display: none;">
                <div class="results-header">
                    <h2>생성된 콘텐츠</h2>
                </div>
                <div id="results-content">
                    <!-- 결과가 여기에 표시됩니다 -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // 간단한 콘텐츠 생성 함수
        document.getElementById('generate-btn').addEventListener('click', async function() {
            const topic = document.getElementById('topic').value;
            const keywords = document.getElementById('keywords').value;
            const contentType = document.getElementById('content-type').value;

            if (!topic) {
                alert('주제를 입력해주세요.');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...';

            try {
                const response = await fetch('/api/content/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic: topic,
                        keywords: keywords,
                        type: contentType
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data.result);
                } else {
                    alert('콘텐츠 생성에 실패했습니다: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> 콘텐츠 생성';
            }
        });

        function displayResults(result) {
            const resultsContent = document.getElementById('results-content');

            resultsContent.innerHTML = `
                <div class="content-item">
                    <h3>${result.title}</h3>
                    <p><strong>요약:</strong> ${result.summary}</p>
                    <div class="content-preview">
                        <p>${result.content.substring(0, 200)}...</p>
                    </div>
                    <div class="content-actions">
                        <button class="btn btn-primary" onclick="openEditor('${result.title}', \`${result.content}\`)">
                            <i class="fas fa-edit"></i> 에디터에서 열기
                        </button>
                        <button class="btn btn-secondary" onclick="copyToClipboard(\`${result.content}\`)">
                            <i class="fas fa-copy"></i> 복사
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('results').style.display = 'block';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('콘텐츠가 클립보드에 복사되었습니다.', 'success');
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
