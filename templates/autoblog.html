<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBlog 블로그 자동 발행 - Content Automation Studio</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Simple Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .blog-preview {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #dee2e6;
        }

        .blog-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        .blog-meta {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #6c757d;
        }

        .blog-content {
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background: #007bff;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .platform-config {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .scheduled-list {
            background: white;
            border-radius: 8px;
            margin-top: 20px;
        }

        .scheduled-item {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scheduled-item:last-child {
            border-bottom: none;
        }

        .scheduled-time {
            color: #6c757d;
            font-size: 14px;
        }

        .tab-navigation {
            display: flex;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 20px;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.2s ease;
        }

        .tab-button.active {
            color: #007bff;
            border-bottom-color: #007bff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .batch-keywords {
            background: white;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 10px;
            min-height: 120px;
            width: 100%;
            font-family: inherit;
            resize: vertical;
        }

        .result-summary {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .keyword-result {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .keyword-result h4 {
            margin: 0 0 10px 0;
            color: #007bff;
        }

        .platform-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AutoBlog 블로그 자동 발행</h1>
            <p>OpenAI Assistant 기반 전문 블로그 콘텐츠 생성 및 다중 플랫폼 발행</p>
        </header>

        <div class="form-section">
            <!-- 탭 네비게이션 -->
            <div class="tab-navigation">
                <button class="tab-button active" onclick="switchTab('generate')">
                    <i class="fas fa-pen"></i> 콘텐츠 생성
                </button>
                <button class="tab-button" onclick="switchTab('publish')">
                    <i class="fas fa-paper-plane"></i> 발행 관리
                </button>
                <button class="tab-button" onclick="switchTab('batch')">
                    <i class="fas fa-layer-group"></i> 일괄 처리
                </button>
                <button class="tab-button" onclick="switchTab('schedule')">
                    <i class="fas fa-clock"></i> 예약 발행
                </button>
            </div>

            <!-- 콘텐츠 생성 -->
            <div id="generate-tab" class="tab-content active">
                <form id="blogForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="keyword">블로그 주제 *</label>
                            <input type="text" id="keyword" class="form-control" required
                                   placeholder="예: 스마트워치 추천">
                        </div>

                        <div class="form-group">
                            <label for="platform">발행 플랫폼</label>
                            <select id="platform" class="form-control">
                                <option value="general">일반 (HTML)</option>
                                <option value="tistory">Tistory</option>
                                <option value="blogger">Google Blogger</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="style">작성 스타일</label>
                            <select id="style" class="form-control">
                                <option value="professional">전문적</option>
                                <option value="casual">캐주얼</option>
                                <option value="shopping">쇼핑</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="generateImage">이미지 생성</label>
                            <select id="generateImage" class="form-control">
                                <option value="true">생성</option>
                                <option value="false">생성 안함</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Gemini API Status</label>
                        <div class="alert alert-info">
                            <i class="fas fa-robot"></i> Gemini API가 자동으로 사용됩니다.<br>
                            <small>Vertex AI 이미지 생성과 WebDAV 스토리지가 통합되어 있습니다.</small>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-magic"></i> 블로그 콘텐츠 생성
                    </button>
                </form>

                <!-- 생성 결과 -->
                <div id="generateResult"></div>
            </div>

            <!-- 발행 관리 -->
            <div id="publish-tab" class="tab-content">
                <div class="platform-config">
                    <h3><i class="fas fa-cog"></i> 플랫폼 설정</h3>
                    <div id="platformSettings">
                        <p>먼저 '콘텐츠 생성' 탭에서 블로그를 생성해주세요.</p>
                    </div>
                </div>

                <div class="form-group">
                    <button class="btn btn-success" onclick="publishCurrentBlog()" id="publishBtn" disabled>
                        <i class="fas fa-paper-plane"></i> 현재 블로그 발행
                    </button>
                </div>

                <div id="publishResult"></div>
            </div>

            <!-- 일괄 처리 -->
            <div id="batch-tab" class="tab-content">
                <form id="batchForm">
                    <div class="form-group">
                        <label for="batchKeywords">키워드 목록 (줄바꿈으로 구분) *</label>
                        <textarea id="batchKeywords" class="batch-keywords" rows="6" required
                                  placeholder="스마트워치 추천&#10;노이즈캔슬링 헤드폰&#10;블루투스 스피커&#10;갤럭시 탭 비교&#10;애플워치 기능"></textarea>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="batchPlatform">발행 플랫폼</label>
                            <select id="batchPlatform" class="form-control">
                                <option value="general">일반 (HTML)</option>
                                <option value="tistory">Tistory</option>
                                <option value="blogger">Google Blogger</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="batchStyle">작성 스타일</label>
                            <select id="batchStyle" class="form-control">
                                <option value="professional">전문적</option>
                                <option value="casual">캐주얼</option>
                                <option value="shopping">쇼핑</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="batchGenerateImage">
                            이미지 생성 (배치 처리에는 시간이 오래 걸릴 수 있습니다)
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-layer-group"></i> 일괄 생성
                    </button>
                </form>

                <div id="batchResult"></div>
            </div>

            <!-- 예약 발행 -->
            <div id="schedule-tab" class="tab-content">
                <div class="form-group">
                    <label for="scheduleHours">예약 시간 (현재로부터)</label>
                    <select id="scheduleHours" class="form-control">
                        <option value="1">1시간 후</option>
                        <option value="2">2시간 후</option>
                        <option value="6">6시간 후</option>
                        <option value="12">12시간 후</option>
                        <option value="24">24시간 후</option>
                        <option value="48">48시간 후</option>
                        <option value="72">3일 후</option>
                    </select>
                </div>

                <div class="form-group">
                    <button class="btn btn-info" onclick="scheduleCurrentBlog()" id="scheduleBtn" disabled>
                        <i class="fas fa-clock"></i> 현재 블로그 예약 발행
                    </button>
                </div>

                <h3>예약된 발행 목록</h3>
                <div id="scheduledList" class="scheduled-list">
                    <p>예약된 발행이 없습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentBlogData = null;

        // 탭 전환
        function switchTab(tabName) {
            // 모든 탭 버튼과 콘텐츠 비활성화
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 선택된 탭 활성화
            event.target.closest('.tab-button').classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');

            // 예약 발행 목록 새로고침
            if (tabName === 'schedule') {
                loadScheduledPosts();
            }
        }

        // Toast 알림
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 블로그 생성
        document.getElementById('blogForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                keyword: document.getElementById('keyword').value,
                platform: document.getElementById('platform').value,
                style: document.getElementById('style').value,
                generate_image: document.getElementById('generateImage').value === 'true'
            };

            try {
                showToast('Gemini API로 블로그 콘텐츠 생성 중...', 'info');

                const response = await fetch('/api/gemini-blog/generate-blog', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    currentBlogData = result.blog_data;
                    displayBlogPreview(result.blog_data);
                    updatePlatformSettings(result.blog_data.platform);
                    enablePublishButtons();
                    showToast('블로그 콘텐츠 생성 완료!');
                } else {
                    showToast('생성 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('오류 발생: ' + error.message, 'error');
            }
        });

        // 블로그 미리보기 표시
        function displayBlogPreview(blogData) {
            const resultDiv = document.getElementById('generateResult');

            let html = `
                <div class="blog-preview">
                    <h2 class="blog-title">${blogData.title}</h2>
                    <div class="blog-meta">
                        <strong>플랫폼:</strong> ${blogData.platform}<br>
                        <strong>스타일:</strong> ${blogData.style}<br>
                        <strong>키워드:</strong> ${blogData.keyword}<br>
                        <strong>Slug:</strong> ${blogData.slug || '없음'}<br>
                        ${blogData.fallback ? '<span style="color: #ffc107;">⚠️ Fallback 모드로 생성됨</span>' : ''}
                    </div>
            `;

            if (blogData.image_url) {
                html += `<img src="${blogData.image_url}" alt="Generated image" style="max-width: 100%; border-radius: 8px; margin-bottom: 15px;">`;
            }

            html += `
                <div class="blog-content">
                    ${blogData.content}
                </div>
                <div class="blog-tags">
                    ${blogData.tags.split(',').map(tag => `<span class="tag">${tag.trim()}</span>`).join('')}
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="copyToClipboard('content')">
                        <i class="fas fa-copy"></i> 콘텐츠 복사
                    </button>
                    <button class="btn btn-secondary" onclick="copyToClipboard('html')">
                        <i class="fas fa-code"></i> HTML 복사
                    </button>
                </div>
            </div>
            `;

            resultDiv.innerHTML = html;
        }

        // 플랫폼 설정 업데이트
        function updatePlatformSettings(platform) {
            const settingsDiv = document.getElementById('platformSettings');

            let settingsHTML = '<h4>플랫폼별 설정</h4>';

            if (platform === 'tistory') {
                settingsHTML += `
                    <div class="form-group">
                        <label>Tistory Access Token</label>
                        <input type="password" id="tistoryToken" class="form-control" placeholder="Tistory Access Token">
                    </div>
                    <div class="form-group">
                        <label>블로그 이름</label>
                        <input type="text" id="tistoryBlogName" class="form-control" placeholder="your-blog">
                    </div>
                    <div class="form-group">
                        <label>카테고리</label>
                        <input type="text" id="tistoryCategory" class="form-control" placeholder="IT/개발">
                    </div>
                `;
            } else if (platform === 'blogger') {
                settingsHTML += `
                    <div class="form-group">
                        <label>Google Access Token</label>
                        <input type="password" id="bloggerToken" class="form-control" placeholder="Google Access Token">
                    </div>
                    <div class="form-group">
                        <label>Blog ID</label>
                        <input type="text" id="bloggerBlogId" class="form-control" placeholder="1234567890123456789">
                    </div>
                `;
            } else {
                settingsHTML += '<p>일반 HTML 파일로 저장됩니다. 추가 설정이 필요 없습니다.</p>';
            }

            settingsDiv.innerHTML = settingsHTML;
        }

        // 발행 버튼 활성화
        function enablePublishButtons() {
            document.getElementById('publishBtn').disabled = false;
            document.getElementById('scheduleBtn').disabled = false;
        }

        // 현재 블로그 발행
        async function publishCurrentBlog() {
            if (!currentBlogData) {
                showToast('먼저 블로그 콘텐츠를 생성해주세요.', 'error');
                return;
            }

            const config = getPlatformConfig();

            try {
                showToast('발행 중...', 'info');

                const response = await fetch('/api/gemini-blog/publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        platform: currentBlogData.platform,
                        blog_data: currentBlogData,
                        config: config
                    })
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('publishResult').innerHTML = `
                        <div class="blog-preview">
                            <h3><i class="fas fa-check-circle" style="color: #28a745;"></i> 발행 성공!</h3>
                            <p><strong>플랫폼:</strong> ${result.platform}</p>
                            <p><strong>게시물 URL:</strong> <a href="${result.post_url}" target="_blank">${result.post_url}</a></p>
                            <p><strong>게시물 ID:</strong> ${result.post_id}</p>
                            <p><strong>발행 시간:</strong> ${new Date(result.timestamp).toLocaleString()}</p>
                        </div>
                    `;
                    showToast('블로그 발행 완료!');
                } else {
                    showToast('발행 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('발행 오류: ' + error.message, 'error');
            }
        }

        // 플랫폼 설정 가져오기
        function getPlatformConfig() {
            const platform = currentBlogData.platform;
            const config = {};

            if (platform === 'tistory') {
                config.access_token = document.getElementById('tistoryToken')?.value;
                config.blog_name = document.getElementById('tistoryBlogName')?.value;
                config.category = document.getElementById('tistoryCategory')?.value;
                config.visibility = 3; // 공개
                config.accept_comment = 1;
                config.accept_trackback = 1;
                config.published = 1; // 즉시 발행
            } else if (platform === 'blogger') {
                config.access_token = document.getElementById('bloggerToken')?.value;
                config.blog_id = document.getElementById('bloggerBlogId')?.value;
                config.status = 'LIVE'; // 발행
            }

            return config;
        }

        // 현재 블로그 예약 발행
        async function scheduleCurrentBlog() {
            if (!currentBlogData) {
                showToast('먼저 블로그 콘텐츠를 생성해주세요.', 'error');
                return;
            }

            const config = getPlatformConfig();
            const scheduleHours = parseInt(document.getElementById('scheduleHours').value);

            try {
                showToast('예약 발행 중...', 'info');

                const response = await fetch('/api/autoblog/schedule-publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        platform: currentBlogData.platform,
                        blog_data: currentBlogData,
                        config: config,
                        schedule_hours: scheduleHours
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showToast(result.message);
                    loadScheduledPosts();
                } else {
                    showToast('예약 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('예약 오류: ' + error.message, 'error');
            }
        }

        // 예약된 발행 목록 로드
        async function loadScheduledPosts() {
            try {
                const response = await fetch('/api/gemini-blog/scheduled-posts');
                const result = await response.json();

                if (result.success) {
                    displayScheduledPosts(result.scheduled_posts);
                }
            } catch (error) {
                console.error('예약 목록 로드 실패:', error);
            }
        }

        // 예약된 발행 목록 표시
        function displayScheduledPosts(posts) {
            const listDiv = document.getElementById('scheduledList');

            if (posts.length === 0) {
                listDiv.innerHTML = '<p>예약된 발행이 없습니다.</p>';
                return;
            }

            let html = '';
            posts.forEach(post => {
                const scheduleTime = new Date(post.schedule_time);
                html += `
                    <div class="scheduled-item">
                        <div>
                            <h4>${post.blog_data.title}</h4>
                            <p class="scheduled-time">
                                <i class="fas fa-clock"></i> ${scheduleTime.toLocaleString()}
                                (<span class="badge badge-info">${post.platform}</span>)
                            </p>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-danger" onclick="cancelSchedule('${post.id}')">
                                <i class="fas fa-times"></i> 취소
                            </button>
                        </div>
                    </div>
                `;
            });

            listDiv.innerHTML = html;
        }

        // 예약 발행 취소
        async function cancelSchedule(scheduleId) {
            try {
                const response = await fetch('/api/autoblog/cancel-schedule', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        schedule_id: scheduleId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showToast(result.message);
                    loadScheduledPosts();
                } else {
                    showToast('취소 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('취소 오류: ' + error.message, 'error');
            }
        }

        // 일괄 처리
        document.getElementById('batchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const keywordsText = document.getElementById('batchKeywords').value;
            const keywords = keywordsText.split('\n').map(k => k.trim()).filter(k => k);

            if (keywords.length === 0) {
                showToast('최소 1개 이상의 키워드를 입력해주세요.', 'error');
                return;
            }

            const data = {
                keywords: keywords,
                platform: document.getElementById('batchPlatform').value,
                style: document.getElementById('batchStyle').value,
                generate_image: document.getElementById('batchGenerateImage').checked,
                openai_key: document.getElementById('openaiKey')?.value,
                assistant_id: document.getElementById('assistantId')?.value
            };

            try {
                showToast('일괄 생성 중... (시간이 오래 걸릴 수 있습니다)', 'info');

                const response = await fetch('/api/gemini-blog/batch-generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    displayBatchResults(result.results, result.summary);
                    showToast(`${result.summary.successful}/${result.summary.total}개 생성 완료!`);
                } else {
                    showToast('일괄 생성 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('오류 발생: ' + error.message, 'error');
            }
        });

        // 일괄 결과 표시
        function displayBatchResults(results, summary) {
            const resultDiv = document.getElementById('batchResult');

            let html = `
                <div class="result-summary">
                    <h3><i class="fas fa-chart-bar"></i> 일괄 처리 결과</h3>
                    <p><strong>전체:</strong> ${summary.total}</p>
                    <p><strong>성공:</strong> ${summary.successful}</p>
                    <p><strong>실패:</strong> ${summary.failed}</p>
                    <p><strong>플랫폼:</strong> ${summary.platform}</p>
                    <p><strong>스타일:</strong> ${summary.style}</p>
                </div>
            `;

            results.forEach(result => {
                const statusIcon = result.success ? '✅' : '❌';
                const statusClass = result.success ? 'success' : 'danger';

                html += `
                    <div class="keyword-result">
                        <h4>${statusIcon} ${result.keyword}</h4>
                        ${result.success ? `
                            <p><strong>제목:</strong> ${result.blog_data.title}</p>
                            <p><strong>플랫폼:</strong> ${result.blog_data.platform}</p>
                            ${result.fallback ? '<span class="badge badge-warning">Fallback</span>' : ''}
                            <button class="btn btn-sm btn-secondary" onclick="viewBlogDetails('${result.keyword}', ${JSON.stringify(result.blog_data).replace(/"/g, '&quot;')})">
                                <i class="fas fa-eye"></i> 상세 보기
                            </button>
                        ` : `
                            <p style="color: #dc3545;">실패: ${result.error}</p>
                        `}
                    </div>
                `;
            });

            resultDiv.innerHTML = html;
        }

        // 블로그 상세 보기
        function viewBlogDetails(keyword, blogData) {
            currentBlogData = blogData;
            displayBlogPreview(blogData);
            updatePlatformSettings(blogData.platform);
            enablePublishButtons();

            // 탭 이동
            document.querySelector('[onclick="switchTab(\'generate\')"]').click();

            showToast(`'${keyword}' 블로그를 발행 탭에서 관리할 수 있습니다.`);
        }

        // 클립보드 복사
        function copyToClipboard(type) {
            if (!currentBlogData) return;

            let textToCopy = '';
            if (type === 'content') {
                // HTML 태그 제거하고 순수 텍스트 복사
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = currentBlogData.content;
                textToCopy = tempDiv.textContent || tempDiv.innerText;
            } else {
                // 전체 HTML 복사
                textToCopy = currentBlogData.content;
            }

            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast('클립보드에 복사되었습니다!');
            }).catch(err => {
                showToast('복사 실패: ' + err.message, 'error');
            });
        }
    </script>
</body>
</html>
