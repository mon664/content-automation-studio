<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoVid 비디오 스크립트 생성 - Content Automation Studio</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Simple Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .script-result {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .segment {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .segment-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #dee2e6;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .segment-content {
            padding: 20px;
        }

        .script-text {
            background: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin: 10px 0;
            font-style: italic;
            line-height: 1.6;
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .keyword {
            background: #e9ecef;
            color: #495057;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .image-preview {
            width: 100%;
            max-width: 300px;
            height: 200px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            margin: 10px 0;
        }

        .batch-topics {
            background: white;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 10px;
            min-height: 100px;
            width: 100%;
        }

        .video-duration {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .tab-navigation {
            display: flex;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 20px;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.2s ease;
        }

        .tab-button.active {
            color: #007bff;
            border-bottom-color: #007bff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AutoVid 비디오 스크립트 생성</h1>
            <p>AI 기반 자동 비디오 스크립트 제작 시스템</p>
        </header>

        <div class="form-section">
            <!-- 탭 네비게이션 -->
            <div class="tab-navigation">
                <button class="tab-button active" onclick="switchTab('single')">
                    <i class="fas fa-film"></i> 단일 스크립트 생성
                </button>
                <button class="tab-button" onclick="switchTab('batch')">
                    <i class="fas fa-layer-group"></i> 일괄 처리
                </button>
                <button class="tab-button" onclick="switchTab('blog')">
                    <i class="fas fa-newspaper"></i> 블로그 → 비디오
                </button>
            </div>

            <!-- 단일 스크립트 생성 -->
            <div id="single-tab" class="tab-content active">
                <form id="scriptForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="subject">비디오 주제 *</label>
                            <input type="text" id="subject" class="form-control" required
                                   placeholder="예: 세상에서 가장 위험한 관광지">
                        </div>

                        <div class="form-group">
                            <label for="requestNumber">생성할 파트 개수</label>
                            <select id="requestNumber" class="form-control">
                                <option value="3">3개</option>
                                <option value="5" selected>5개</option>
                                <option value="7">7개</option>
                                <option value="10">10개</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="language">언어</label>
                            <select id="language" class="form-control">
                                <option value="ko-KR" selected>한국어</option>
                                <option value="en-US">English</option>
                                <option value="ja-JP">日本語</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="autoGenerateImages">이미지 자동 생성</label>
                            <select id="autoGenerateImages" class="form-control">
                                <option value="true" selected>생성</option>
                                <option value="false">생성 안함</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="includeOpening" checked>
                            오프닝 세그먼트 포함
                        </label>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="includeClosing" checked>
                            클로징 세그먼트 포함
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-magic"></i> 스크립트 생성
                    </button>
                </form>
            </div>

            <!-- 일괄 처리 -->
            <div id="batch-tab" class="tab-content">
                <form id="batchForm">
                    <div class="form-group">
                        <label for="batchTopics">주제 목록 (줄바꿈으로 구분) *</label>
                        <textarea id="batchTopics" class="batch-topics" rows="6" required
                                  placeholder="미래 기술 트렌드&#10;환경 보호 방법&#10;건강한 식습관&#10;여행 꿀팁&#10;재테크 전략"></textarea>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="batchRequestNumber">각 주제별 파트 개수</label>
                            <select id="batchRequestNumber" class="form-control">
                                <option value="3">3개</option>
                                <option value="5" selected>5개</option>
                                <option value="7">7개</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="batchLanguage">언어</label>
                            <select id="batchLanguage" class="form-control">
                                <option value="ko-KR" selected>한국어</option>
                                <option value="en-US">English</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-layer-group"></i> 일괄 생성
                    </button>
                </form>
            </div>

            <!-- 블로그 → 비디오 -->
            <div id="blog-tab" class="tab-content">
                <form id="blogForm">
                    <div class="form-group">
                        <label for="blogContent">블로그 콘텐츠 *</label>
                        <textarea id="blogContent" class="form-control" rows="10" required
                                  placeholder="여기에 블로그 콘텐츠를 붙여넣으세요..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="targetLength">목표 비디오 길이</label>
                        <select id="targetLength" class="form-control">
                            <option value="3분">3분</option>
                            <option value="5분" selected>5분</option>
                            <option value="10분">10분</option>
                            <option value="15분">15분</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-exchange-alt"></i> 비디오 스크립트 변환
                    </button>
                </form>
            </div>
        </div>

        <!-- 결과 표시 -->
        <div id="results"></div>
    </div>

    <script>
        // 탭 전환
        function switchTab(tabName) {
            // 모든 탭 버튼과 콘텐츠 비활성화
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 선택된 탭 활성화
            event.target.closest('.tab-button').classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        // Toast 알림
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 단일 스크립트 생성
        document.getElementById('scriptForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                subject: document.getElementById('subject').value,
                requestNumber: parseInt(document.getElementById('requestNumber').value),
                requestLanguage: document.getElementById('language').value,
                includeOpeningSegment: document.getElementById('includeOpening').checked,
                includeClosingSegment: document.getElementById('includeClosing').checked,
                includeImageGenPrompt: true,
                autoGenerateImages: document.getElementById('autoGenerateImages').value === 'true'
            };

            try {
                const response = await fetch('/api/video-script/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    displayScriptResult(result.script, result.metadata);
                    showToast('스크립트 생성 완료!');
                } else {
                    showToast('스크립트 생성 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('오류 발생: ' + error.message, 'error');
            }
        });

        // 일괄 처리
        document.getElementById('batchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const topicsText = document.getElementById('batchTopics').value;
            const topics = topicsText.split('\n').filter(topic => topic.trim());

            const data = {
                topics: topics,
                config: {
                    requestNumber: parseInt(document.getElementById('batchRequestNumber').value),
                    requestLanguage: document.getElementById('batchLanguage').value,
                    includeOpeningSegment: true,
                    includeClosingSegment: true,
                    includeImageGenPrompt: true,
                    autoGenerateImages: false
                }
            };

            try {
                const response = await fetch('/api/video-script/batch-generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    displayBatchResults(result.results, result.summary);
                    showToast(`${result.summary.successful}개 스크립트 생성 완료!`);
                } else {
                    showToast('일괄 생성 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('오류 발생: ' + error.message, 'error');
            }
        });

        // 블로그 → 비디오 변환
        document.getElementById('blogForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                blogContent: document.getElementById('blogContent').value,
                targetVideoLength: document.getElementById('targetLength').value
            };

            try {
                const response = await fetch('/api/video-script/blog-to-video', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    displayScriptResult(result.script);
                    showToast('블로그 → 비디오 변환 완료!');
                } else {
                    showToast('변환 실패: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('오류 발생: ' + error.message, 'error');
            }
        });

        // 스크립트 결과 표시
        function displayScriptResult(script, metadata = null) {
            const resultsDiv = document.getElementById('results');
            let html = `
                <div class="script-result">
                    <div class="results-header">
                        <h2>${script.title}</h2>
                        ${metadata ? `<span class="video-duration">예상 시간: ${metadata.estimatedDuration}</span>` : ''}
                    </div>
            `;

            // 오프닝 세그먼트
            if (script.openingSegment) {
                html += createSegmentHTML('오프닝', script.openingSegment, null);
            }

            // 메인 세그먼트
            script.snippets.forEach(snippet => {
                html += createSegmentHTML(snippet.segmentTitle, snippet, snippet.rank);
            });

            // 클로징 세그먼트
            if (script.closingSegment) {
                html += createSegmentHTML('클로징', script.closingSegment, null);
            }

            html += '</div>';
            resultsDiv.innerHTML = html;
        }

        // 세그먼트 HTML 생성
        function createSegmentHTML(title, segment, rank) {
            return `
                <div class="segment">
                    <div class="segment-header">
                        <span>${title} ${rank ? `#${rank}` : ''}</span>
                        <div class="segment-actions">
                            <button class="btn btn-secondary" onclick="copyToClipboard('${title.replace(/[^a-zA-Z0-9]/g, '_')}_script')">
                                <i class="fas fa-copy"></i> 복사
                            </button>
                        </div>
                    </div>
                    <div class="segment-content">
                        ${segment.videoSearchKeyword ? `
                            <div>
                                <strong>비디오 검색 키워드:</strong>
                                <div class="keywords">
                                    ${segment.videoSearchKeyword.map(keyword => `<span class="keyword">${keyword}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <div id="${title.replace(/[^a-zA-Z0-9]/g, '_')}_script" class="script-text">
                            ${segment.script ? segment.script.join('<br>') : ''}
                        </div>

                        ${segment.imageGenPrompt ? `
                            <div>
                                <strong>이미지 생성 프롬프트:</strong>
                                <div class="script-text">${segment.imageGenPrompt}</div>
                            </div>
                        ` : ''}

                        ${segment.imageUrl ? `
                            <div>
                                <strong>생성된 이미지:</strong>
                                <img src="${segment.imageUrl}" alt="Generated image" style="max-width: 300px; border-radius: 8px; margin-top: 10px;">
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // 일괄 결과 표시
        function displayBatchResults(results, summary) {
            const resultsDiv = document.getElementById('results');
            let html = `
                <div class="script-result">
                    <div class="results-header">
                        <h2>일괄 처리 결과</h2>
                        <div>
                            <span class="badge badge-success">성공: ${summary.successful}</span>
                            <span class="badge badge-danger">실패: ${summary.failed}</span>
                            <span class="badge badge-info">전체: ${summary.total}</span>
                        </div>
                    </div>
            `;

            results.forEach(result => {
                if (result.success) {
                    html += `
                        <div class="segment">
                            <div class="segment-header">
                                <span>✅ ${result.topic}</span>
                                <button class="btn btn-secondary" onclick="displayScriptResult(${JSON.stringify(result.script).replace(/"/g, '&quot;')})">
                                    <i class="fas fa-eye"></i> 보기
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="segment">
                            <div class="segment-header">
                                <span>❌ ${result.topic}</span>
                                <span style="color: #dc3545;">${result.error}</span>
                            </div>
                        </div>
                    `;
                }
            });

            html += '</div>';
            resultsDiv.innerHTML = html;
        }

        // 클립보드 복사
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.innerText;

            navigator.clipboard.writeText(text).then(() => {
                showToast('클립보드에 복사되었습니다!');
            }).catch(err => {
                showToast('복사 실패: ' + err.message, 'error');
            });
        }
    </script>
</body>
</html>
